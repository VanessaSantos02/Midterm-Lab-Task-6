<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .Input input{
            display: block;
            padding: 5px;
            margin-bottom: 2px;
        }

        .Question p ,button {
            display: inline-block;
            width: 100px;
            vertical-align: middle;
        }
        
        .googol{
            margin:  auto;
            text-align: center;
        }

        .search-bar{
            display: block;
            width: 500px;
            margin:  auto;
            border-radius: 50px;
            height: 30px;
        }

        .info input{
            display: inline-block;
            margin: 2px;
            border-radius: 10px;
            height: 30px;
        }

        .email input{
            display:block;
            margin: 2px;
            border-radius: 10px;
            height: 30px;
            width: 340px;
        }
        
        .btn{
            display: block;
            margin: 2px;
            border-radius: 10px;
            background-color: blue;
            color: white;
            width: 345px;
            height: 30px;
            border: 0px;
            margin-top: 5px;
        }

        .ride input{
            display: block;
            width:300px;
            height: 30px;
            background-color: whitesmoke;
            margin-bottom: 3px;
            border: 0px;
        }

        .req {
            background-color: black;
            color: white;
            width:100px;
            height: 30px;
            margin-left: 3px;
            border: 0px;

        }

        .sced{
            background-color: antiquewhite;
            width: 110px;
            height: 35px;
            border: 0;
        }
    </style>
</head>
<body>

    <h4>Create 2 text boxes and put them on separate lines </h4>
    <div class="Input">
    <input type="text" size="20" placeholder="Name">
    <input type="text" size="20" placeholder="Email"></span>
    </div>


<br>


<h4>Create a paragraph and 2 buttons and place them on the same line</h4>
    <div class="Question">
        <p> Thanks for Chatting with our customer support. Would you like to take our quick survey?</p>
        <button>Yes</button>
        <button>No</button>
    </div>

    <br>
    

    <h4>Google Logo</h4>
    <div class="googol">
        <img src="../img/google.jpg" width="300px">
        <input class="search-bar" type="text" size="50" placeholder="Search Google or type a URL">
    </div>

    <br>


    <h4>Sign up form</h4>
    <div class="info">
        <input type="text" size="20" placeholder="First Name">
        <input type="text" size="20" placeholder="Last Name">
        </div>

        <div class="email">
        <input type="text" size="39" placeholder="Email">
        </div>
        <button class="btn">Sign Up</button>
        
        <br>
        

    <h2>Uber request a ride form</h2>
    <div class="ride">
        <input type="text" size="30" placeholder="Enter pickup location">
        <input type="text" size="30" placeholder="Enter destination">
    </div>
    
    <div>
        <button class="req">Request now</button>
        <button class="sced">Schedule for later</button>
    </div>
</body>
</html>
